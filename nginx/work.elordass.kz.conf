server {
    listen 80;
    server_name work.elordass.kz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name work.elordass.kz;

    ssl_certificate     /etc/letsencrypt/live/work.elordass.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/work.elordass.kz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Статика React (собранный dist/)
    root /opt/ees-report-app/react-client/dist;
    index index.html;

    client_max_body_size 50M;

    # API → Express backend (порт 5000)
    location /api {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }

    # Загруженные фото
    location /uploads/ {
        proxy_pass http://127.0.0.1:5000/uploads/;
        proxy_set_header Host $host;
    }

    # SPA — все остальные маршруты отдаём index.html
    location / {
        try_files $uri /index.html;
    }
}
