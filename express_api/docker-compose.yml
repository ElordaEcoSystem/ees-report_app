version: "3.8"

services:
  backend: # Сервер Express
    build: .
    ports:
      - "4000:4000"
    depends_on:
      - db
      - frontend
    environment:
      DATABASE_URL: "postgresql://postgres:pass@db:5432/mydatabase"
      PORT: 4000
    command: >
      sh -c "sleep 5 &&
         npx prisma db push &&
         npm start"

  db:
    image: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: mydatabase
    # volumes:
    #   - db_data:/var/lib/postgresql/data

  frontend: # React-приложение
    build: ../react-client # Путь к вашему React-приложению относительно корня вашего проекта
    expose:
      - "80" # Открыт ТОЛЬКО внутри docker-сети

volumes:
  react_app: # Объявление именованного тома
