version: "3.8"

services:
  backend:
    build: .
    expose:
      - "4000"
    depends_on:
      - db
      - frontend
    environment:
      DATABASE_URL: "postgresql://postgres:pass@db:5432/mydatabase"
      PORT: 4000
    command: >
      sh -c "sleep 5 &&
             npx prisma db push &&
             npm start"
    networks:
      - dev

  db:
    image: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: mydatabase
    networks:
      - dev

  frontend:
    build: ../react-client
    expose:
      - "80"
    networks:
      - dev

volumes:
  react_app:

networks:
  dev:
